services:
  # Backend API Service
  - type: web
    name: smartseason-backend
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://smartseason-field-monitoring-system.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: smartseason-db
          property: connectionString

  # PostgreSQL Database
  - type: pserv
    name: smartseason-db
    plan: free
    databaseName: smartseason_db
    user: smartseason_user
